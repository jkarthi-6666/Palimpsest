services:
  postgres:
    image: postgres:16
    container_name: palimpsest-postgres
    environment:
      POSTGRES_DB: palimpsest
      POSTGRES_USER: palimpsest
      POSTGRES_PASSWORD: palimpsest
    ports:
      # Use 5433 on the host so Palimpsest can coexist with a local Postgres.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palimpsest -d palimpsest"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - palimpsest

  qdrant:
    image: qdrant/qdrant:latest
    container_name: palimpsest-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - palimpsest

volumes:
  postgres_data:
  qdrant_data:

networks:
  palimpsest:
    name: palimpsest
